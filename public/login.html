<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Result Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-page">
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo">RMS</h1>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/about">About</a>
                    <a href="/login" class="active">Login</a>
                </div>
            </div>
        </nav>

        <main class="login-main">
            <div class="login-container">
                <div class="login-box">
                    <h2>Login to Your Account</h2>
                    <p class="login-subtitle">Access your dashboard based on your role</p>
                    
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required 
                                   placeholder="Enter your email">
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required 
                                   placeholder="Enter your password">
                        </div>
                        
                        <div class="form-group">
                            <button type="submit" class="btn-login-submit">Login</button>
                        </div>
                        
                        <div id="errorMessage" class="error-message" style="display: none;"></div>
                    </form>

                    <div class="login-info">
                        <h4>Demo Credentials:</h4>
                        <p><strong>Admin:</strong> admin@rms.com / admin123</p>
                        <p><strong>Teacher:</strong> (Create via admin panel)</p>
                        <p><strong>Student:</strong> (Create via admin panel)</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Result Management System. All rights reserved.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
